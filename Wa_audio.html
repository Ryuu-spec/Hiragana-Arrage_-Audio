<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>히라가나 배열하기 - 라행/와행</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            padding: 20px 40px;
            overflow-x: hidden;
            touch-action: pan-y;
            display: flex;
            flex-direction: column;
        }

        .container {
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        h1 {
            color: white;
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 75px;
            margin-top: 55px;
            font-weight: 600;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.2rem;
            font-weight: 400;
        }

        .game-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            flex: 1;
            margin-top: -80px;
        }

        .right-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 225px;
            justify-content: space-between;
        }

        .panel-wrapper {
            display: flex;
            width: 100%;
            flex: 1;
        }

        .row-buttons {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .row-label {
            width: 120px;
            height: 100px;
            background: linear-gradient(135deg, #fbc02d 0%, #f9a825 100%);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(249, 168, 37, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .row-label.ra-row {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
            box-shadow: 0 4px 15px rgba(244, 67, 54, 0.4);
        }

        .row-label.ha-row {
            background: linear-gradient(135deg, #795548 0%, #5d4037 100%);
            box-shadow: 0 4px 15px rgba(121, 85, 72, 0.4);
        }

        .rows-section {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .answer-row {
            display: flex;
            gap: 20px;
            justify-content: flex-start;
        }

        .answer-slot {
            width: 95px;
            height: 100px;
            background: rgba(30, 35, 60, 0.5);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Klee One', 'Hiragino Kaku Gothic ProN', sans-serif;
            font-size: 2.8rem;
            font-weight: 600;
            position: relative;
            transition: all 0.3s ease;
        }

        .answer-slot.empty-spacer {
            background: transparent;
            border: none;
            pointer-events: none;
        }

        .answer-slot[data-row="ra"] {
            border-bottom: 3px solid #d32f2f;
            color: #d32f2f;
        }

        .answer-slot[data-row="wa"] {
            border-bottom: 3px solid #795548;
            color: #795548;
        }

        .answer-slot[data-row="ra"].drag-over {
            background: rgba(211, 47, 47, 0.2);
            border-bottom-width: 5px;
        }

        .answer-slot[data-row="wa"].drag-over {
            background: rgba(121, 85, 72, 0.2);
            border-bottom-width: 5px;
        }

        .answer-slot[data-row="ra"].filled {
            background: rgba(211, 47, 47, 0.08);
        }

        .answer-slot[data-row="wa"].filled {
            background: rgba(121, 85, 72, 0.08);
        }

        .answer-slot.correct::after {
            content: '✓';
            position: absolute;
            bottom: -32px;
            font-size: 1.5rem;
            color: white;
            animation: checkmarkAppear 0.3s ease;
        }

        @keyframes checkmarkAppear {
            from { 
                opacity: 0;
                transform: translateY(-10px) scale(0.5);
            }
            to { 
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }

        @keyframes bounce-back {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .answer-slot.wrong {
            animation: shake 0.5s ease;
            border-bottom-color: #ff4444;
        }

        .option-char.wrong-bounce {
            animation: bounce-back 0.5s ease;
        }

        .options-panel {
            width: 420px;
            background: rgba(30, 35, 60, 0.4);
            border-radius: 20px;
            padding: 30px 30px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .options-area {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px 18px;
            justify-items: center;
            align-items: center;
        }

        .option-char {
            font-family: 'Klee One', 'Hiragino Kaku Gothic ProN', sans-serif;
            font-size: 3.5rem;
            font-weight: 600;
            cursor: move;
            cursor: grab;
            transition: transform 0.1s ease, opacity 0.3s ease;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .option-char:active {
            cursor: grabbing;
        }

        .option-char.dragging {
            opacity: 0.7;
            transform: scale(1.3);
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.5));
            z-index: 1000;
            position: relative;
        }

        .drag-clone {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            font-family: 'Klee One', 'Hiragino Kaku Gothic ProN', sans-serif;
            font-size: 3.5rem;
            font-weight: 600;
            opacity: 0.9;
            transform: scale(1.3);
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.5));
        }

        .option-char.placed {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.5);
        }

        /* Ra행 색상 - 확실히 다른 색상들 */
        .option-char[data-char="ら"] { color: #FFB300; }  /* 진한 노란색/골드 */
        .option-char[data-char="り"] { color: #E91E63; }  /* 핑크 */
        .option-char[data-char="る"] { color: #00BCD4; }  /* 시안 */
        .option-char[data-char="れ"] { color: #FF6F00; }  /* 진한 주황 */
        .option-char[data-char="ろ"] { color: #4CAF50; }  /* 녹색 */

        /* Wa행 색상 - 확실히 다른 색상들 */
        .option-char[data-char="わ"] { color: #9C27B0; }  /* 보라색 */
        .option-char[data-char="を"] { color: #2196F3; }  /* 파란색 */

        .reset-btn-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 15px;
            width: 420px;
            height: 0;
            position: relative;
        }

        .reset-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            touch-action: manipulation;
            position: absolute;
            top: 0;
        }

        .reset-btn:active {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(0.95);
        }

        /* 폭죽 효과 */
        .fireworks-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .fireworks-container.active {
            opacity: 1;
        }

        .firework {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: firework-explosion 1.2s ease-out forwards;
        }

        @keyframes firework-explosion {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        @media (max-width: 1200px) {
            body {
                padding: 30px 40px;
            }
            
            h1 {
                font-size: 2.2rem;
                margin-bottom: 40px;
            }
            
            .game-wrapper {
                gap: 30px;
            }
            
            .row-label {
                width: 120px;
                height: 80px;
                font-size: 1.8rem;
            }
            
            .answer-slot {
                width: 95px;
                height: 80px;
                font-size: 2.5rem;
            }
            
            .options-panel {
                width: 400px;
                padding: 40px 30px;
            }

            .reset-btn-wrapper {
                width: 400px;
            }
            
            .option-char {
                font-size: 3.5rem;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8rem;
                margin-bottom: 30px;
            }
            
            .game-wrapper {
                flex-direction: column;
                gap: 30px;
            }
            
            .row-buttons {
                flex-direction: row;
                gap: 15px;
            }
            
            .row-label {
                width: 100px;
                height: 70px;
                font-size: 1.5rem;
            }
            
            .rows-section {
                gap: 25px;
            }
            
            .answer-row {
                gap: 12px;
                justify-content: center;
            }
            
            .answer-slot {
                width: 60px;
                height: 60px;
                font-size: 2rem;
            }
            
            .options-panel {
                width: 100%;
                max-width: 350px;
                padding: 30px 20px;
            }

            .reset-btn-wrapper {
                width: 100%;
                max-width: 350px;
            }
            
            .options-area {
                gap: 15px 10px;
            }
            
            .option-char {
                font-size: 2.5rem;
            }

            .reset-btn {
                padding: 8px 20px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>히라가나 배열하기 <span class="subtitle">(50음도순)</span></h1>

        <div class="game-wrapper">
            <!-- 왼쪽: 행 라벨 및 답안 슬롯 -->
            <div class="row-buttons">
                <div class="row-label ra-row">Ra행</div>
                <div class="row-label ha-row">Wa행</div>
            </div>

            <div class="rows-section">
                <div class="answer-row">
                    <div class="answer-slot" data-index="0" data-row="ra"></div>
                    <div class="answer-slot" data-index="1" data-row="ra"></div>
                    <div class="answer-slot" data-index="2" data-row="ra"></div>
                    <div class="answer-slot" data-index="3" data-row="ra"></div>
                    <div class="answer-slot" data-index="4" data-row="ra"></div>
                </div>

                <div class="answer-row">
                    <div class="answer-slot" data-index="0" data-row="wa"></div>
                    <div class="answer-slot empty-spacer"></div>
                    <div class="answer-slot empty-spacer"></div>
                    <div class="answer-slot empty-spacer"></div>
                    <div class="answer-slot" data-index="1" data-row="wa"></div>
                </div>
            </div>

            <!-- 오른쪽: 문자 패널 + 다시 시작 버튼 -->
            <div class="right-section">
                <div class="panel-wrapper">
                    <div class="options-panel">
                        <div class="options-area" id="optionsArea">
                            <!-- Ra행 문자 -->
                            <div class="option-char" data-char="ら" data-row="ra" draggable="true">ら</div>
                            <div class="option-char" data-char="り" data-row="ra" draggable="true">り</div>
                            <div class="option-char" data-char="る" data-row="ra" draggable="true">る</div>
                            <div class="option-char" data-char="れ" data-row="ra" draggable="true">れ</div>
                            <div class="option-char" data-char="ろ" data-row="ra" draggable="true">ろ</div>

                            <!-- Wa행 문자 -->
                            <div class="option-char" data-char="わ" data-row="wa" draggable="true">わ</div>
                            <div class="option-char" data-char="を" data-row="wa" draggable="true">を</div>
                        </div>
                    </div>
                </div>
                
                <div class="reset-btn-wrapper">
                    <button class="reset-btn" onclick="resetGame()">다시 시작</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 폭죽 효과 컨테이너 -->
    <div class="fireworks-container" id="fireworksContainer"></div>

    <script>
        var correctOrder = {
            'ra': ['ら', 'り', 'る', 'れ', 'ろ'],
            'wa': ['わ', 'を']
        };
        
        var currentAnswers = {
            'ra': ['', '', '', '', ''],
            'wa': ['', '']
        };
        
        var draggedElement = null;
        var touchStartX, touchStartY;
        var isDragging = false;
        var currentTouchElement = null;
        var dragClone = null;

        // ===== 사운드 기능 =====
        function playCorrectSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 523.25; // C5
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.2);
        }

        function playIncorrectSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 200; // Lower tone
            oscillator.type = 'sawtooth';
            
            gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.15);
        }

        function playCelebrationSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const notes = [523.25, 659.25, 783.99, 1046.50]; // C, E, G, C
            
            notes.forEach((freq, index) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = freq;
                oscillator.type = 'sine';
                
                const startTime = audioContext.currentTime + (index * 0.15);
                gainNode.gain.setValueAtTime(0.3, startTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.4);
                
                oscillator.start(startTime);
                oscillator.stop(startTime + 0.4);
            });
        }
        // ===== 사운드 기능 끝 =====

        function initDragAndDrop() {
            var chars = document.querySelectorAll('.option-char');
            
            chars.forEach(function(char) {
                char.addEventListener('dragstart', function(e) {
                    draggedElement = this;
                    this.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                });

                char.addEventListener('mousedown', function(e) {
                    if (!this.classList.contains('placed')) {
                        playPronunciation(this.getAttribute('data-char'));
                    }
                });

                char.addEventListener('dragend', function(e) {
                    this.classList.remove('dragging');
                });

                char.addEventListener('touchstart', handleTouchStart, {passive: false});
                char.addEventListener('touchmove', handleTouchMove, {passive: false});
                char.addEventListener('touchend', handleTouchEnd, {passive: false});
            });

            var slots = document.querySelectorAll('.answer-slot');
            
            slots.forEach(function(slot) {
                slot.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    this.classList.add('drag-over');
                    return false;
                });

                slot.addEventListener('dragleave', function(e) {
                    this.classList.remove('drag-over');
                });

                slot.addEventListener('drop', function(e) {
                    e.preventDefault();
                    this.classList.remove('drag-over');
                    
                    if (draggedElement && !this.classList.contains('filled')) {
                        handleDrop(draggedElement, this);
                    }
                    
                    return false;
                });
            });
        }

        function handleTouchStart(e) {
            if (this.classList.contains('placed')) return;
            
            e.preventDefault();
            playPronunciation(this.getAttribute('data-char'));
            currentTouchElement = this;
            isDragging = false;
            
            var touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        }

        function handleTouchMove(e) {
            if (!currentTouchElement) return;
            e.preventDefault();
            
            var touch = e.touches[0];
            
            if (!isDragging) {
                isDragging = true;
                currentTouchElement.classList.add('dragging');
                
                // 드래그 클론 생성
                dragClone = document.createElement('div');
                dragClone.className = 'drag-clone';
                dragClone.textContent = currentTouchElement.textContent;
                dragClone.style.color = window.getComputedStyle(currentTouchElement).color;
                document.body.appendChild(dragClone);
            }
            
            // 드래그 클론 위치 업데이트
            if (dragClone) {
                dragClone.style.left = (touch.clientX - 30) + 'px';
                dragClone.style.top = (touch.clientY - 40) + 'px';
            }
        }

        function handleTouchEnd(e) {
            if (!currentTouchElement || !isDragging) {
                currentTouchElement = null;
                return;
            }
            
            e.preventDefault();
            currentTouchElement.classList.remove('dragging');
            
            // 드래그 클론 제거
            if (dragClone) {
                dragClone.remove();
                dragClone = null;
            }
            
            var touch = e.changedTouches[0];
            var dropTarget = document.elementFromPoint(touch.clientX, touch.clientY);
            
            while (dropTarget && !dropTarget.classList.contains('answer-slot')) {
                dropTarget = dropTarget.parentElement;
            }
            
            if (dropTarget && dropTarget.classList.contains('answer-slot') && !dropTarget.classList.contains('filled')) {
                handleDrop(currentTouchElement, dropTarget);
            }
            
            currentTouchElement = null;
            isDragging = false;
        }

        function handleDrop(charElement, slotElement) {
            var char = charElement.getAttribute('data-char');
            var charRow = charElement.getAttribute('data-row');
            var slotRow = slotElement.getAttribute('data-row');
            var index = parseInt(slotElement.getAttribute('data-index'));
            
            // 행이 맞지 않으면 거부
            if (charRow !== slotRow) {
                playIncorrectSound(); // 오답 소리 추가
                slotElement.classList.add('wrong');
                charElement.classList.add('wrong-bounce');
                
                if (navigator.vibrate) {
                    navigator.vibrate([50, 50, 50]);
                }
                
                setTimeout(function() {
                    slotElement.classList.remove('wrong');
                    charElement.classList.remove('wrong-bounce');
                }, 500);
                
                return;
            }
            
            if (currentAnswers[slotRow][index] === '') {
                currentAnswers[slotRow][index] = char;
                slotElement.textContent = char;
                slotElement.classList.add('filled');

                if (char === correctOrder[slotRow][index]) {
                    playCorrectSound(); // 정답 소리 추가
                    slotElement.classList.add('correct');
                    charElement.classList.add('placed');
                } else {
                    playIncorrectSound(); // 오답 소리 추가
                    slotElement.classList.add('wrong');
                    charElement.classList.add('wrong-bounce');
                    
                    if (navigator.vibrate) {
                        navigator.vibrate([50, 50, 50]);
                    }
                    
                    setTimeout(function() {
                        slotElement.textContent = '';
                        slotElement.classList.remove('filled', 'wrong');
                        currentAnswers[slotRow][index] = '';
                        charElement.classList.remove('wrong-bounce');
                    }, 500);
                    
                    return;
                }

                checkCompletion();
            }
        }

        function createFireworks() {
            var container = document.getElementById('fireworksContainer');
            container.innerHTML = '';
            container.classList.add('active');
            
            var colors = ['#ff6b9d', '#ff8c42', '#c77dff', '#ffbe0b', '#ffd166', '#8b5cf6', '#a78bfa'];
            var fireworkCount = 12;
            
            for (var f = 0; f < fireworkCount; f++) {
                var x = Math.random() * window.innerWidth;
                var y = Math.random() * window.innerHeight;
                var particleCount = 35;
                
                for (var i = 0; i < particleCount; i++) {
                    var particle = document.createElement('div');
                    particle.className = 'firework';
                    particle.style.left = x + 'px';
                    particle.style.top = y + 'px';
                    particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    
                    var angle = (Math.PI * 2 * i) / particleCount;
                    var velocity = 80 + Math.random() * 150;
                    var tx = Math.cos(angle) * velocity;
                    var ty = Math.sin(angle) * velocity;
                    
                    particle.style.setProperty('--tx', tx + 'px');
                    particle.style.setProperty('--ty', ty + 'px');
                    particle.style.animationDelay = (f * 0.12) + 's';
                    
                    container.appendChild(particle);
                }
            }
            
            setTimeout(function() {
                container.classList.remove('active');
            }, 2500);
        }

        function checkCompletion() {
            var allCorrect = true;
            
            for (var row in currentAnswers) {
                for (var i = 0; i < currentAnswers[row].length; i++) {
                    if (currentAnswers[row][i] !== correctOrder[row][i]) {
                        allCorrect = false;
                        break;
                    }
                }
                if (!allCorrect) break;
            }

            if (allCorrect) {
                setTimeout(function() {
                    playCelebrationSound(); // 축하 소리 추가
                    createFireworks();
                }, 500);
            }
        }

        function resetGame() {
            currentAnswers = {
                'ra': ['', '', '', '', ''],
                'wa': ['', '']
            };
            
            var slots = document.querySelectorAll('.answer-slot');
            for (var i = 0; i < slots.length; i++) {
                slots[i].textContent = '';
                slots[i].classList.remove('filled', 'correct', 'drag-over', 'wrong');
            }

            var chars = document.querySelectorAll('.option-char');
            for (var j = 0; j < chars.length; j++) {
                chars[j].classList.remove('placed', 'dragging', 'wrong-bounce');
            }

            var container = document.getElementById('fireworksContainer');
            container.classList.remove('active');
            container.innerHTML = '';
            
            // 드래그 클론이 남아있으면 제거
            if (dragClone) {
                dragClone.remove();
                dragClone = null;
            }
            
            shuffleChars();
        }

        function shuffleChars() {
            var area = document.getElementById('optionsArea');
            var chars = Array.from(area.children);
            
            for (var i = chars.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                area.insertBefore(chars[j], chars[i]);
            }
        }

        window.onload = function() {
            shuffleChars();
            initDragAndDrop();
