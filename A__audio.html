<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>히라가나 배열하기 - あ행</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            padding: 20px 40px;
            overflow-x: hidden;
            touch-action: pan-y;
            display: flex;
            flex-direction: column;
        }

        .container {
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        h1 {
            color: white;
            text-align: center;
            font-size: 3rem;
            margin-bottom: 75px;
            margin-top: 55px;
            font-weight: 600;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.2rem;
            font-weight: 400;
            margin-left: 10px;
        }

        .game-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            flex: 1;
            margin-top: -80px;
        }

        .right-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100px;
            justify-content: space-between;
        }

        .panel-wrapper {
            display: flex;
            width: 100%;
            flex: 1;
        }

        .row-buttons {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .row-label {
            width: 120px;
            height: 100px;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff4581 100%);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rows-section {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .answer-row {
            display: flex;
            gap: 20px;
            justify-content: flex-start;
        }

        .answer-slot {
            width: 95px;
            height: 100px;
            background: rgba(30, 35, 60, 0.5);
            border-radius: 12px;
            border-bottom: 3px solid #ff6b9d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Klee One', 'Hiragino Kaku Gothic ProN', sans-serif;
            font-size: 2.8rem;
            font-weight: 600;
            color: #ff6b9d;
            position: relative;
            transition: all 0.3s ease;
        }

        .answer-slot.drag-over {
            background: rgba(255, 107, 157, 0.2);
            border-bottom-width: 5px;
        }

        .answer-slot.filled {
            background: rgba(255, 107, 157, 0.08);
        }

        .answer-slot.correct::after {
            content: '✓';
            position: absolute;
            bottom: -32px;
            font-size: 1.5rem;
            color: white;
            animation: checkmarkAppear 0.3s ease;
        }

        @keyframes checkmarkAppear {
            from { 
                opacity: 0;
                transform: translateY(-10px) scale(0.5);
            }
            to { 
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }

        @keyframes bounce-back {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .answer-slot.wrong {
            animation: shake 0.5s ease;
            border-bottom-color: #ff4444;
        }

        .option-char.wrong-bounce {
            animation: bounce-back 0.5s ease;
        }

        .options-panel {
            width: 420px;
            background: rgba(30, 35, 60, 0.4);
            border-radius: 20px;
            padding: 15px 30px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .options-area {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px 18px;
            justify-items: center;
            align-items: center;
        }

        .option-char {
            font-family: 'Klee One', 'Hiragino Kaku Gothic ProN', sans-serif;
            font-size: 3.5rem;
            font-weight: 600;
            cursor: move;
            cursor: grab;
            transition: transform 0.1s ease, opacity 0.3s ease;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .option-char:active {
            cursor: grabbing;
        }

        .option-char.dragging {
            opacity: 0.7;
            transform: scale(1.3);
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.5));
            z-index: 1000;
            position: relative;
        }

        .drag-clone {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            font-family: 'Klee One', 'Hiragino Kaku Gothic ProN', sans-serif;
            font-size: 3.5rem;
            font-weight: 600;
            opacity: 0.9;
            transform: scale(1.3);
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.5));
        }

        .option-char.placed {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.5);
        }

        /* あ행 색상 */
        .option-char[data-char="あ"] { color: #ff8c42; }
        .option-char[data-char="い"] { color: #c77dff; }
        .option-char[data-char="う"] { color: #ffbe0b; }
        .option-char[data-char="え"] { color: #ff6b9d; }
        .option-char[data-char="お"] { color: #ffd166; }

        .reset-btn-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 15px;
            width: 420px;
            height: 0;
            position: relative;
        }

        .reset-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            touch-action: manipulation;
            position: absolute;
            top: 0;
        }

        .reset-btn:active {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(0.95);
        }

        /* 폭죽 효과 */
        .fireworks-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .fireworks-container.active {
            opacity: 1;
        }

        .firework {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: firework-explode 1.2s ease-out forwards;
        }

        @keyframes firework-explode {
            0% {
                transform: translate(0, 0);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty));
                opacity: 0;
            }
        }

        /* 반응형 디자인 */
        @media (max-width: 1200px) {
            .game-wrapper {
                flex-direction: column;
                gap: 40px;
                margin-top: 0;
            }

            h1 {
                font-size: 2.5rem;
                margin-bottom: 50px;
                margin-top: 30px;
            }

            .row-buttons {
                flex-direction: row;
                gap: 15px;
            }

            .row-label {
                width: 100px;
                height: 80px;
                font-size: 1.5rem;
            }

            .answer-slot {
                width: 85px;
                height: 90px;
                font-size: 2.5rem;
            }

            .options-panel {
                width: 380px;
            }

            .reset-btn-wrapper {
                width: 380px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 15px 20px;
            }

            h1 {
                font-size: 2rem;
                margin-bottom: 40px;
                margin-top: 20px;
            }

            .subtitle {
                font-size: 1rem;
            }

            .row-label {
                width: 80px;
                height: 70px;
                font-size: 1.3rem;
            }

            .answer-slot {
                width: 70px;
                height: 75px;
                font-size: 2.2rem;
            }

            .answer-row {
                gap: 12px;
            }

            .options-panel {
                width: 340px;
                padding: 20px 25px;
            }

            .options-area {
                gap: 15px 12px;
            }

            .option-char {
                font-size: 3rem;
            }

            .drag-clone {
                font-size: 3rem;
            }

            .reset-btn-wrapper {
                width: 340px;
                margin-top: 20px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.6rem;
                margin-bottom: 30px;
            }

            .subtitle {
                font-size: 0.9rem;
            }

            .row-label {
                width: 65px;
                height: 60px;
                font-size: 1.1rem;
            }

            .answer-slot {
                width: 58px;
                height: 65px;
                font-size: 1.9rem;
            }

            .answer-row {
                gap: 8px;
            }

            .options-panel {
                width: 300px;
                padding: 18px 20px;
            }

            .options-area {
                gap: 12px 10px;
            }

            .option-char {
                font-size: 2.5rem;
            }

            .drag-clone {
                font-size: 2.5rem;
            }

            .reset-btn-wrapper {
                width: 300px;
            }

            .reset-btn {
                font-size: 0.8rem;
                padding: 7px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            히라가나 배열하기 <span class="subtitle">(50음도순)</span>
        </h1>

        <div class="game-wrapper">
            <div class="row-buttons">
                <div class="row-label">A행</div>
            </div>

            <div class="rows-section">
                <div class="answer-row">
                    <div class="answer-slot" data-row="a" data-index="0"></div>
                    <div class="answer-slot" data-row="a" data-index="1"></div>
                    <div class="answer-slot" data-row="a" data-index="2"></div>
                    <div class="answer-slot" data-row="a" data-index="3"></div>
                    <div class="answer-slot" data-row="a" data-index="4"></div>
                </div>
            </div>

            <div class="right-section">
                <div class="panel-wrapper">
                    <div class="options-panel">
                        <div class="options-area" id="optionsArea">
                            <div class="option-char" draggable="true" data-char="あ" data-row="a">あ</div>
                            <div class="option-char" draggable="true" data-char="い" data-row="a">い</div>
                            <div class="option-char" draggable="true" data-char="う" data-row="a">う</div>
                            <div class="option-char" draggable="true" data-char="え" data-row="a">え</div>
                            <div class="option-char" draggable="true" data-char="お" data-row="a">お</div>
                        </div>
                    </div>
                </div>
                <div class="reset-btn-wrapper">
                    <button class="reset-btn" onclick="resetGame()">다시 시작</button>
                </div>
            </div>
        </div>
    </div>

    <div class="fireworks-container" id="fireworksContainer"></div>

    <script>
        var correctOrder = {
            'a': ['あ', 'い', 'う', 'え', 'お']
        };
        
        var currentAnswers = {
            'a': ['', '', '', '', '']
        };
        
        var draggedElement = null;
        var touchStartX, touchStartY;
        var isDragging = false;
        var currentTouchElement = null;
        var dragClone = null;

        // ===== AudioContext 효과음 함수들 =====
        function playCorrectSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 523.25; // C5
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.2);
        }

        function playIncorrectSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 200; // Lower tone
            oscillator.type = 'sawtooth';
            
            gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.15);
        }

        function playCelebrationSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const notes = [523.25, 659.25, 783.99, 1046.50]; // C, E, G, C
            
            notes.forEach((freq, index) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = freq;
                oscillator.type = 'sine';
                
                const startTime = audioContext.currentTime + (index * 0.15);
                gainNode.gain.setValueAtTime(0.3, startTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.4);
                
                oscillator.start(startTime);
                oscillator.stop(startTime + 0.4);
            });
        }

        function playPronunciation(char) {
            var audio = pronunciationAudio[char];
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(function() {});
            }
        }
        // ===== 발음 오디오 끝 =====


        function initDragAndDrop() {
            var chars = document.querySelectorAll('.option-char');
            
            chars.forEach(function(char) {
                char.addEventListener('dragstart', function(e) {
                    draggedElement = this;
                    this.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                });

                char.addEventListener('mousedown', function(e) {
                    if (!this.classList.contains('placed')) {
                        playPronunciation(this.getAttribute('data-char'));
                    }
                });

                char.addEventListener('dragend', function(e) {
                    this.classList.remove('dragging');
                });

                char.addEventListener('touchstart', handleTouchStart, {passive: false});
                char.addEventListener('touchmove', handleTouchMove, {passive: false});
                char.addEventListener('touchend', handleTouchEnd, {passive: false});
            });

            var slots = document.querySelectorAll('.answer-slot');
            
            slots.forEach(function(slot) {
                slot.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    this.classList.add('drag-over');
                    return false;
                });

                slot.addEventListener('dragleave', function(e) {
                    this.classList.remove('drag-over');
                });

                slot.addEventListener('drop', function(e) {
                    e.preventDefault();
                    this.classList.remove('drag-over');
                    
                    if (draggedElement && !this.classList.contains('filled')) {
                        handleDrop(draggedElement, this);
                    }
                    
                    return false;
                });
            });
        }

        function handleTouchStart(e) {
            if (this.classList.contains('placed')) return;
            
            e.preventDefault();
            playPronunciation(this.getAttribute('data-char'));
            currentTouchElement = this;
            isDragging = false;
            
            var touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        }

        function handleTouchMove(e) {
            if (!currentTouchElement) return;
            e.preventDefault();
            
            var touch = e.touches[0];
            
            if (!isDragging) {
                isDragging = true;
                currentTouchElement.classList.add('dragging');
                
                // 드래그 클론 생성
                dragClone = document.createElement('div');
                dragClone.className = 'drag-clone';
                dragClone.textContent = currentTouchElement.textContent;
                dragClone.style.color = window.getComputedStyle(currentTouchElement).color;
                document.body.appendChild(dragClone);
            }
            
            // 드래그 클론 위치 업데이트
            if (dragClone) {
                dragClone.style.left = (touch.clientX - 30) + 'px';
                dragClone.style.top = (touch.clientY - 40) + 'px';
            }
        }

        function handleTouchEnd(e) {
            if (!currentTouchElement || !isDragging) {
                currentTouchElement = null;
                return;
            }
            
            e.preventDefault();
            currentTouchElement.classList.remove('dragging');
            
            // 드래그 클론 제거
            if (dragClone) {
                dragClone.remove();
                dragClone = null;
            }
            
            var touch = e.changedTouches[0];
            var dropTarget = document.elementFromPoint(touch.clientX, touch.clientY);
            
            while (dropTarget && !dropTarget.classList.contains('answer-slot')) {
                dropTarget = dropTarget.parentElement;
            }
            
            if (dropTarget && dropTarget.classList.contains('answer-slot') && !dropTarget.classList.contains('filled')) {
                handleDrop(currentTouchElement, dropTarget);
            }
            
            currentTouchElement = null;
            isDragging = false;
        }

        function handleDrop(charElement, slotElement) {
            var char = charElement.getAttribute('data-char');
            var charRow = charElement.getAttribute('data-row');
            var slotRow = slotElement.getAttribute('data-row');
            var index = parseInt(slotElement.getAttribute('data-index'));
            
            // 행이 맞지 않으면 거부
            if (charRow !== slotRow) {
                playIncorrectSound(); // 실패음 추가
                slotElement.classList.add('wrong');
                charElement.classList.add('wrong-bounce');
                
                if (navigator.vibrate) {
                    navigator.vibrate([50, 50, 50]);
                }
                
                setTimeout(function() {
                    slotElement.classList.remove('wrong');
                    charElement.classList.remove('wrong-bounce');
                }, 500);
                
                return;
            }
            
            if (currentAnswers[slotRow][index] === '') {
                currentAnswers[slotRow][index] = char;
                slotElement.textContent = char;
                slotElement.classList.add('filled');

                if (char === correctOrder[slotRow][index]) {
                    playCorrectSound(); // 성공음 추가
                    slotElement.classList.add('correct');
                    charElement.classList.add('placed');
                } else {
                    playIncorrectSound(); // 실패음 추가
                    slotElement.classList.add('wrong');
                    charElement.classList.add('wrong-bounce');
                    
                    if (navigator.vibrate) {
                        navigator.vibrate([50, 50, 50]);
                    }
                    
                    setTimeout(function() {
                        slotElement.textContent = '';
                        slotElement.classList.remove('filled', 'wrong');
                        currentAnswers[slotRow][index] = '';
                        charElement.classList.remove('wrong-bounce');
                    }, 500);
                    
                    return;
                }

                checkCompletion();
            }
        }

        function createFireworks() {
            var container = document.getElementById('fireworksContainer');
            container.innerHTML = '';
            container.classList.add('active');
            
            var colors = ['#ff6b9d', '#ff8c42', '#c77dff', '#ffbe0b', '#ffd166', '#4ecca3', '#48dbfb'];
            var fireworkCount = 12;
            
            for (var f = 0; f < fireworkCount; f++) {
                var x = Math.random() * window.innerWidth;
                var y = Math.random() * window.innerHeight;
                var particleCount = 35;
                
                for (var i = 0; i < particleCount; i++) {
                    var particle = document.createElement('div');
                    particle.className = 'firework';
                    particle.style.left = x + 'px';
                    particle.style.top = y + 'px';
                    particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    
                    var angle = (Math.PI * 2 * i) / particleCount;
                    var velocity = 80 + Math.random() * 150;
                    var tx = Math.cos(angle) * velocity;
                    var ty = Math.sin(angle) * velocity;
                    
                    particle.style.setProperty('--tx', tx + 'px');
                    particle.style.setProperty('--ty', ty + 'px');
                    particle.style.animationDelay = (f * 0.12) + 's';
                    
                    container.appendChild(particle);
                }
            }
            
            setTimeout(function() {
                container.classList.remove('active');
            }, 2500);
        }

        function checkCompletion() {
            var allCorrect = true;
            
            for (var row in currentAnswers) {
                for (var i = 0; i < currentAnswers[row].length; i++) {
                    if (currentAnswers[row][i] !== correctOrder[row][i]) {
                        allCorrect = false;
                        break;
                    }
                }
                if (!allCorrect) break;
            }

            if (allCorrect) {
                setTimeout(function() {
                    playCelebrationSound(); // 축하음 추가
                    createFireworks();
                }, 500);
            }
        }

        function resetGame() {
            currentAnswers = {
                'a': ['', '', '', '', '']
            };
            
            var slots = document.querySelectorAll('.answer-slot');
            for (var i = 0; i < slots.length; i++) {
                slots[i].textContent = '';
                slots[i].classList.remove('filled', 'correct', 'drag-over', 'wrong');
            }

            var chars = document.querySelectorAll('.option-char');
            for (var j = 0; j < chars.length; j++) {
                chars[j].classList.remove('placed', 'dragging', 'wrong-bounce');
            }

            var container = document.getElementById('fireworksContainer');
            container.classList.remove('active');
            container.innerHTML = '';
            
            // 드래그 클론이 남아있으면 제거
            if (dragClone) {
                dragClone.remove();
                dragClone = null;
            }
            
            shuffleChars();
        }

        function shuffleChars() {
            var area = document.getElementById('optionsArea');
            var chars = Array.from(area.children);
            
            // Fisher-Yates 셔플 알고리즘
            for (var i = chars.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = chars[i];
                chars[i] = chars[j];
                chars[j] = temp;
            }
            
            // 셔플된 순서대로 DOM에 다시 추가
            area.innerHTML = '';
            chars.forEach(function(char) {
                area.appendChild(char);
            });
        }

        window.onload = function() {
            shuffleChars();
            initDragAndDrop();
        };
    </script>
</body>
</html>
